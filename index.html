<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WeatherWave</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Font Awesome Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#1e3c72,#2a5298);
color:white;
transition:0.5s;
}

body.night{
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
}

.card-custom{
width:380px;
border-radius:20px;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(15px);
box-shadow:0 10px 40px rgba(0,0,0,0.4);
}

.icon{
font-size:70px;
animation:float 2s infinite ease-in-out;
}

 @keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(-8px)}
100%{transform:translateY(0)}
} 

.forecast{
display:flex;
justify-content:space-between;
margin-top:20px;
}

.day{
background:rgba(255,255,255,0.2);
padding:10px;
border-radius:10px;
width:60px;
text-align:center;
}

</style>
</head>

<body>

<div class="card card-custom text-center p-4">

<h2 class="mb-3">
<i class="fa-solid fa-cloud-sun"></i> WeatherWave
</h2>

<div class="input-group mb-3">
<input id="cityInput" class="form-control" placeholder="Enter city">
<button class="btn btn-info text-white" onclick="getWeather()">
<i class="fa-solid fa-magnifying-glass"></i>
</button>
</div>

<div class="spinner-border text-light d-none" id="loader"></div>

<div class="icon mt-3">
<i id="icon" class="fa-solid fa-cloud"></i>
</div>

<h3 id="city" class="mt-2"></h3>

<div class="display-5 fw-bold">
<span id="temp"></span>°C
</div>

<div id="weather" class="mb-2"> </div>

<div>
<i class="fa-solid fa-wind text-info"></i>
Wind Speed: <span id="speed"></span> m/s
</div>

<div class="forecast" id="forecast"></div>

</div>

<script>

const API_KEY=""

async function getWeather(){

let city=document.getElementById("cityInput").value
fetchWeather(city)

}

async function fetchWeather(city){

let loader=document.getElementById("loader")
loader.classList.remove("d-none")

let url=`https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${API_KEY}`

let res=await fetch(url)
let data=await res.json()

loader.classList.add("d-none")

document.getElementById("city").innerText=data.name
document.getElementById("temp").innerText=Math.round(data.main.temp-273)
document.getElementById("weather").innerText=data.weather[0].description
document.getElementById("speed").innerText=data.wind.speed

setIcon(data.weather[0].main)

getForecast(city)

}

/* Weather Icons */
function setIcon(weather){

let icon=document.getElementById("icon")

if(weather=="Clear"){
icon.className="fa-solid fa-sun"
icon.style.color="#FFD93D"
}

else if(weather=="Clouds"){ 
icon.className="fa-solid fa-cloud"
icon.style.color="#dfe6e9"
}

else if(weather=="Rain"){
icon.className="fa-solid fa-cloud-rain"
icon.style.color="#74b9ff"
}

else if(weather=="Thunderstorm"){
icon.className="fa-solid fa-bolt"
icon.style.color="#f1c40f"
}

else if(weather=="Snow"){
icon.className="fa-solid fa-snowflake"
icon.style.color="#00d2ff"
}

else{
icon.className="fa-solid fa-smog"
icon.style.color="#b2bec3"
}

}
/* Forecast */

async function getForecast(city){

let url=`https://api.openweathermap.org/data/2.5/forecast?q=${city}&appid=${API_KEY}`

let res=await fetch(url)
let data=await res.json()
console.log(data);
let forecastHTML=""

for(let i=0;i<5;i++){

let day=data.list[i*8]
let temp=Math.round(day.main.temp-273)

forecastHTML+=`

<div class="day">
<div>${new Date(day.dt_txt).toLocaleDateString('en',{weekday:'short'})}</div>
<div><i class="fa-solid fa-temperature-half text-danger"></i> ${temp}°</div>
</div>

`

}

document.getElementById("forecast").innerHTML=forecastHTML

}

/* Auto Location */

navigator.geolocation.getCurrentPosition(async position=>{

let lat=position.coords.latitude
let lon=position.coords.longitude

let url=`https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&appid=${API_KEY}`

let res=await fetch(url)

let data=await res.json()

fetchWeather(data.name)

})

/* Day Night Theme */

let hour=new Date().getHours()

if(hour>18 || hour<6){
document.body.classList.add("night")
}

</script>

</body>
</html>
